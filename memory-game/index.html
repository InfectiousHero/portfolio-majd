<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RecallIt — Memory Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1a6b3a;--green-dark:#14532d;--green-light:#eaf2ec;--gold:#c9a84c;--cream:#f5f0e8;--cream-card:#ede7d6;--ink:#1a1a1a;--muted:#6b6b6b;--border:#e3dcc9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:720px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.15rem;}
.nav-brand span{color:var(--green);}
.back-link{font-size:0.78rem;color:var(--green);text-decoration:none;}
.back-link:hover{color:var(--ink);}
.wrap{max-width:720px;margin:0 auto;padding:32px 20px 60px;}
h1{font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:6px;}
.sub{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:28px;max-width:500px;}
.progress-track{display:flex;align-items:center;margin-bottom:28px;}
.pdot{width:9px;height:9px;border-radius:50%;background:#d8d0bc;transition:all 0.3s;}
.pdot.active{background:var(--green);transform:scale(1.3);}
.pdot.done{background:var(--gold);}
.pline{flex:1;height:1px;background:#d8d0bc;}
.pline.done{background:var(--gold);}
.panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:28px;}
.slabel{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.13em;color:var(--green);font-weight:600;margin-bottom:10px;display:block;}
.pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.pill{border:1.5px solid var(--border);background:var(--cream-card);color:var(--muted);padding:8px 20px;border-radius:24px;font-size:0.86rem;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:500;}
.pill.on{background:var(--green);border-color:var(--green);color:#fff;}
.pace-help{font-size:0.78rem;color:var(--muted);margin:6px 0 22px;}
.stepper{display:flex;align-items:center;gap:18px;background:var(--cream-card);border-radius:10px;padding:14px 20px;width:fit-content;margin-bottom:24px;}
.sbtn{width:34px;height:34px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:1.2rem;cursor:pointer;font-family:'Poppins',sans-serif;}
.sbtn:disabled{background:#c9c2ae;cursor:not-allowed;}
.sval{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;min-width:80px;text-align:center;}
.best-note{font-size:0.8rem;color:var(--muted);margin-bottom:22px;}
.best-note b{color:var(--gold);}
.btn-primary{background:var(--green);color:#fff;border:none;padding:12px 32px;font-size:0.92rem;font-weight:600;border-radius:6px;cursor:pointer;font-family:'Poppins',sans-serif;}
.btn-primary:hover{background:var(--green-dark);}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
.btn-secondary{background:transparent;color:var(--green);border:1.5px solid var(--green);padding:10px 24px;font-size:0.88rem;font-weight:600;border-radius:6px;cursor:pointer;font-family:'Poppins',sans-serif;}
.phase-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.13em;color:var(--green);font-weight:600;text-align:center;margin-bottom:6px;display:block;}
.phase-inst{text-align:center;color:var(--muted);font-size:0.88rem;margin-bottom:22px;}
.timer-track{height:5px;background:#e9e3d2;border-radius:3px;overflow:hidden;max-width:280px;margin:0 auto 24px;}
.timer-fill{height:100%;background:var(--gold);border-radius:3px;transition:width 0.15s linear;}
.digit-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:20px 0 28px;}
.dcell{width:52px;height:64px;border-radius:8px;border:2px solid var(--border);background:var(--cream-card);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;color:#c9c2ae;transition:all 0.25s;}
.dcell.lit{border-color:var(--green);background:var(--green);color:#fff;transform:scale(1.08);box-shadow:0 4px 14px rgba(26,107,58,0.3);}
.dcell.passed{border-color:var(--gold);color:var(--gold);background:#fdf7ea;}
.status-line{text-align:center;font-size:0.78rem;color:var(--muted);margin-bottom:6px;}
.status-line b{color:var(--green);}
.rcell{width:52px;height:64px;border-radius:8px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--ink);}
.rcell.filled{border-color:var(--gold);background:#fdf7ea;}
.rcell.cursor{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,107,58,0.15);}
.rcell.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
.rcell.wrong{border-color:#c0392b;background:#fbeae8;color:#c0392b;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:18px auto 22px;}
.kkey{background:var(--cream-card);border:none;border-radius:8px;padding:14px 0;font-size:1.1rem;font-weight:600;color:var(--ink);cursor:pointer;font-family:'JetBrains Mono',monospace;}
.kkey:hover{background:#e3dcc4;}
.kkey.del{font-family:'Poppins',sans-serif;font-size:1rem;color:var(--muted);}
.kkey.enter-key{font-family:'Poppins',sans-serif;font-size:0.8rem;color:var(--green);font-weight:600;}
.result-wrap{text-align:center;padding:10px 0;}
.result-badge{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.13em;color:var(--gold);font-weight:700;margin-bottom:10px;display:block;}
.result-h{font-family:'Playfair Display',serif;font-size:1.9rem;margin-bottom:16px;}
.stat-row{display:flex;justify-content:center;gap:36px;margin-bottom:22px;flex-wrap:wrap;}
.stat .num{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--green);}
.stat .lbl{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
.seq-display{background:var(--cream-card);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:1.1rem;letter-spacing:0.25em;margin-bottom:22px;}
.btn-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.footer-note{text-align:center;margin-top:36px;font-size:0.75rem;color:#a8a08c;}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <span class="nav-brand">Recall<span>It</span></span>
    <a class="back-link" href="../index.html">&#8592; Back to Portfolio</a>
  </div>
</nav>
<div class="wrap">
  <h1>RecallIt</h1>
  <p class="sub">Watch a sequence of digits appear one at a time, then type it back from memory. Choose a level and length to match your pace.</p>
  <div class="progress-track" id="pt"></div>
  <div class="panel" id="panel"></div>
  <p class="footer-note">RecallIt &middot; SEG3125 Assignment 3 &middot; Majd Al Khori &middot; University of Ottawa</p>
</div>
<script>
var LEVELS=[{id:'easy',label:'Easy',ms:1100},{id:'pro',label:'Pro',ms:750},{id:'expert',label:'Expert',ms:450}];
var HELP={easy:'Digits appear slowly — good for getting started.',pro:'A steady pace that gives you a moment to focus.',expert:'Fast pacing — built for chasing a high score.'};
var S={phase:'setup',level:LEVELS[1],len:6,seq:[],entered:[],bestScore:null};

function rnd(){S.seq=[];for(var i=0;i<S.len;i++)S.seq.push(Math.floor(Math.random()*10));}

function progress(){
  var steps=['Setup','Play','Result'];
  var cur=S.phase==='setup'?0:S.phase==='result'?2:1;
  var h='';
  steps.forEach(function(s,i){
    h+='<div class="pdot'+(i<cur?' done':i===cur?' active':'')+'"></div>';
    if(i<steps.length-1)h+='<div class="pline'+(i<cur?' done':'')+'"></div>';
  });
  document.getElementById('pt').innerHTML=h;
}

function render(){
  progress();
  var p=document.getElementById('panel');
  if(S.phase==='setup') p.innerHTML=setupHTML();
  else if(S.phase==='memorize') p.innerHTML=memorizeHTML();
  else if(S.phase==='recall') p.innerHTML=recallHTML();
  else if(S.phase==='result') p.innerHTML=resultHTML();
}

function setupHTML(){
  var h='<span class="slabel">01 &mdash; Choose your level</span>';
  h+='<div class="pills">';
  LEVELS.forEach(function(l){h+='<button class="pill'+(S.level.id===l.id?' on':'')+'" onclick="setLvl(\''+l.id+'\')">'+l.label+'</button>';});
  h+='</div><p class="pace-help">'+HELP[S.level.id]+'</p>';
  h+='<span class="slabel">02 &mdash; Sequence length</span>';
  h+='<div class="stepper"><button class="sbtn" onclick="adjLen(-1)"'+(S.len<=4?' disabled':'')+'>&#8722;</button>';
  h+='<span class="sval">'+S.len+' digits</span>';
  h+='<button class="sbtn" onclick="adjLen(1)"'+(S.len>=10?' disabled':'')+'>+</button></div>';
  if(S.bestScore) h+='<p class="best-note">Your best: <b>'+S.bestScore+' digits</b></p>';
  h+='<button class="btn-primary" onclick="startGame()">Start Game</button>';
  return h;
}

function memorizeHTML(){
  var h='<span class="phase-label">Memorize</span><p class="phase-inst">Watch closely &mdash; the sequence will disappear.</p>';
  h+='<div class="timer-track"><div class="timer-fill" id="tf" style="width:0%"></div></div>';
  h+='<div class="digit-row" id="drow">';
  S.seq.forEach(function(){h+='<div class="dcell"></div>';});
  h+='</div>';
  return h;
}

function recallHTML(){
  var h='<span class="phase-label">Recall</span><p class="phase-inst">Type the sequence back in order.</p>';
  h+='<p class="status-line">Entered: <b>'+S.entered.length+'/'+S.seq.length+'</b></p>';
  h+='<div class="digit-row">';
  S.seq.forEach(function(_,i){
    var cls='rcell';
    if(i<S.entered.length) cls+=' filled';
    else if(i===S.entered.length) cls+=' cursor';
    h+='<div class="'+cls+'">'+(i<S.entered.length?S.entered[i]:'')+'</div>';
  });
  h+='</div>';
  var can=S.entered.length===S.seq.length;
  h+='<div class="keypad">';
  [1,2,3,4,5,6,7,8,9].forEach(function(n){h+='<button class="kkey" onclick="kp('+n+')">'+n+'</button>';});
  h+='<button class="kkey del" onclick="kd()">&#9003;</button>';
  h+='<button class="kkey" onclick="kp(0)">0</button>';
  h+='<button class="kkey enter-key" onclick="submit()"'+(can?'':' disabled')+'>Enter</button>';
  h+='</div><div style="text-align:center">';
  h+='<button class="btn-primary" onclick="submit()"'+(can?'':' disabled')+'>Submit</button></div>';
  return h;
}

function resultHTML(){
  var correct=S.entered.filter(function(d,i){return d===S.seq[i];}).length;
  var perfect=correct===S.seq.length;
  var newBest=perfect&&(S.bestScore===null||S.len>S.bestScore);
  var h='<div class="result-wrap">';
  h+='<span class="result-badge">'+(perfect?(newBest?'New Best!':'Sequence Complete'):'Nice Try')+'</span>';
  h+='<h2 class="result-h">'+(perfect?'You recalled it perfectly.':'You got '+correct+' of '+S.seq.length+' right.')+'</h2>';
  h+='<div class="stat-row"><div class="stat"><div class="num">'+S.seq.length+'</div><div class="lbl">Length</div></div>';
  h+='<div class="stat"><div class="num">'+correct+'</div><div class="lbl">Correct</div></div></div>';
  h+='<p style="font-size:0.78rem;color:#999;margin-bottom:8px;">Correct sequence:</p><div class="seq-display">';
  S.seq.forEach(function(d,i){
    var col=S.entered[i]===d?'color:var(--green)':'color:#c0392b';
    h+='<span style="'+col+'">'+d+'</span>';
  });
  h+='</div><div class="btn-row">';
  h+='<button class="btn-primary" onclick="again()">Play Again</button>';
  h+='<button class="btn-secondary" onclick="toSetup()">Change Settings</button>';
  h+='</div></div>';
  return h;
}

function setLvl(id){LEVELS.forEach(function(l){if(l.id===id)S.level=l;});render();}
function adjLen(d){S.len=Math.min(10,Math.max(4,S.len+d));render();}
function toSetup(){S.phase='setup';document.removeEventListener('keydown',onKey);render();}

function startGame(){
  rnd();S.entered=[];S.phase='memorize';render();
  runShow();
}

function runShow(){
  var idx=-1;
  function step(){
    idx++;
    var cells=document.querySelectorAll('#drow .dcell');
    cells.forEach(function(c,i){
      c.className='dcell';c.textContent='';
      if(i===idx){c.className='dcell lit';c.textContent=S.seq[i];}
      else if(i<idx){c.className='dcell passed';c.textContent=S.seq[i];}
    });
    var tf=document.getElementById('tf');
    if(tf) tf.style.width=(((idx+1)/S.seq.length)*100)+'%';
    if(idx<S.seq.length-1){setTimeout(step,S.level.ms);}
    else{setTimeout(function(){S.phase='recall';render();document.addEventListener('keydown',onKey);},S.level.ms);}
  }
  setTimeout(step,400);
}

function onKey(e){
  if(S.phase!=='recall')return;
  if(e.key>='0'&&e.key<='9')kp(parseInt(e.key,10));
  if(e.key==='Backspace')kd();
  if(e.key==='Enter')submit();
}
function kp(n){if(S.phase!=='recall'||S.entered.length>=S.seq.length)return;S.entered.push(n);render();}
function kd(){if(S.entered.length>0){S.entered.pop();render();}}
function submit(){
  if(S.entered.length!==S.seq.length)return;
  document.removeEventListener('keydown',onKey);
  var correct=S.entered.filter(function(d,i){return d===S.seq[i];}).length;
  if(correct===S.seq.length&&(S.bestScore===null||S.len>S.bestScore))S.bestScore=S.len;
  S.phase='result';render();
}
function again(){rnd();S.entered=[];S.phase='memorize';render();runShow();}

render();
</script>
</body>
</html>
