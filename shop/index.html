<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PitchStore — Football Gear</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--g:#1a6b3a;--gd:#14532d;--gl:#eaf2ec;--go:#c9a84c;--cr:#f5f0e8;--cc:#ede7d6;--ink:#1a1a1a;--mu:#6b6b6b;--bd:#e3dcc9;--rd:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--cr);color:var(--ink);min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{font-family:'Poppins',sans-serif;cursor:pointer;}
/* NAV */
.nav{background:#1a1a1a;position:sticky;top:0;z-index:100;}
.ni{max-width:1100px;margin:0 auto;padding:0 20px;height:58px;display:flex;align-items:center;gap:16px;}
.nb{font-family:'Playfair Display',serif;font-size:1.2rem;color:#f5f0e8;cursor:pointer;}
.nb span{color:var(--go);}
.nl{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nbt{background:none;border:none;padding:7px 14px;font-size:0.8rem;color:rgba(245,240,232,0.6);text-transform:uppercase;letter-spacing:0.05em;border-radius:4px;}
.nbt:hover{color:var(--go);}
.nbt.act{color:var(--go);font-weight:600;}
.cb{background:var(--g);color:#fff;border:none;padding:8px 16px;border-radius:4px;font-size:0.82rem;font-weight:600;display:flex;align-items:center;gap:6px;}
.cb:hover{background:var(--gd);}
.cbadge{background:var(--go);color:#fff;border-radius:10px;padding:1px 7px;font-size:0.7rem;font-weight:700;}
.bkl{font-size:0.75rem;color:rgba(245,240,232,0.5);text-decoration:none;}
.bkl:hover{color:var(--go);}
/* HERO */
.hero{background:#1a1a1a;color:#f5f0e8;padding:50px 20px;}
.hi{max-width:1100px;margin:0 auto;}
.hey{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--go);font-weight:600;margin-bottom:10px;}
.hero h1{font-family:'Playfair Display',serif;font-size:2.2rem;line-height:1.2;margin-bottom:12px;}
.hero h1 span{color:var(--go);}
.hero p{color:rgba(245,240,232,0.55);max-width:420px;font-size:0.9rem;line-height:1.7;margin-bottom:20px;}
.hcta{display:inline-block;background:var(--go);color:#1a1a1a;padding:10px 26px;font-weight:700;font-size:0.88rem;border-radius:4px;cursor:pointer;}
.hcta:hover{background:#b8973d;}
.deal{background:var(--go);color:#1a1a1a;text-align:center;padding:8px;font-size:0.82rem;font-weight:600;}
/* WRAP */
.pw{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
.sl{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.13em;color:var(--g);font-weight:600;margin-bottom:4px;}
.st{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:6px;}
.sd{color:var(--mu);font-size:0.86rem;margin-bottom:20px;}
/* SHOP LAYOUT */
.shl{display:flex;gap:24px;align-items:flex-start;}
.sb{width:230px;flex-shrink:0;}
.pa{flex:1;min-width:0;}
.fc{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:18px;margin-bottom:14px;}
.ft{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--mu);font-weight:600;margin-bottom:10px;}
.fo{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;}
.fo input{accent-color:var(--g);width:14px;height:14px;cursor:pointer;}
.fo label{font-size:0.86rem;cursor:pointer;color:var(--mu);}
.fo label b{color:#888;font-weight:400;font-size:0.75rem;}
.pi{display:flex;gap:7px;}
.pi input{flex:1;border:1px solid var(--bd);border-radius:4px;padding:5px 8px;font-size:0.82rem;min-width:0;}
.clr{background:none;border:none;color:var(--mu);font-size:0.74rem;text-decoration:underline;padding:3px 0;margin-top:6px;cursor:pointer;}
.af{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.at{background:var(--gl);border:1px solid var(--g);color:var(--g);padding:3px 10px;border-radius:12px;font-size:0.74rem;font-weight:500;display:flex;align-items:center;gap:4px;}
.at button{background:none;border:none;color:var(--g);font-size:0.9rem;padding:0;cursor:pointer;line-height:1;}
.rb{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.rc{font-size:0.84rem;color:var(--mu);}
.ss{border:1px solid var(--bd);border-radius:4px;padding:6px 10px;font-size:0.8rem;background:#fff;color:var(--ink);}
/* PRODUCT GRID */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;}
.pc{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;transition:box-shadow 0.2s;}
.pc:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.pim{aspect-ratio:1;background:var(--cc);display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative;cursor:pointer;}
.sb2{position:absolute;top:8px;left:8px;background:var(--rd);color:#fff;font-size:0.62rem;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;}
.pb{padding:12px;}
.pbr{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--mu);margin-bottom:2px;}
.pn{font-size:0.9rem;font-weight:600;margin-bottom:3px;cursor:pointer;}
.pcat{font-size:0.74rem;color:var(--mu);margin-bottom:8px;}
.pr{display:flex;align-items:center;gap:8px;}
.pnw{font-size:1rem;font-weight:700;}
.pws{font-size:0.78rem;color:var(--mu);text-decoration:line-through;}
.ab{width:100%;background:var(--g);color:#fff;border:none;padding:8px;font-size:0.8rem;font-weight:600;border-radius:4px;margin-top:10px;}
.ab:hover{background:var(--gd);}
.ne{text-align:center;padding:50px 20px;color:var(--mu);}
/* DETAIL */
.dl{display:flex;gap:32px;flex-wrap:wrap;align-items:flex-start;}
.dim{flex:0 0 300px;aspect-ratio:1;background:var(--cc);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:5rem;}
.di{flex:1;min-width:220px;}
.dib{font-size:0.74rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--mu);margin-bottom:5px;}
.dn{font-family:'Playfair Display',serif;font-size:1.7rem;margin-bottom:10px;}
.dp{font-size:1.35rem;font-weight:700;}
.dw{font-size:0.95rem;color:var(--mu);text-decoration:line-through;margin-left:10px;}
.dd{font-size:0.9rem;color:var(--mu);line-height:1.7;margin:14px 0;}
.szl{font-size:0.76rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.szg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.szo{border:1.5px solid var(--bd);background:#fff;border-radius:4px;padding:6px 13px;font-size:0.8rem;cursor:pointer;}
.szo.sel{border-color:var(--g);background:var(--gl);color:var(--g);font-weight:600;}
.se{font-size:0.75rem;color:var(--rd);margin-bottom:10px;}
.dadb{width:100%;background:var(--g);color:#fff;border:none;padding:12px;font-size:0.9rem;font-weight:600;border-radius:6px;}
.dadb:hover{background:var(--gd);}
.bk{background:none;border:none;color:var(--g);font-size:0.84rem;margin-bottom:18px;cursor:pointer;display:flex;align-items:center;gap:4px;}
/* CART */
.ce{text-align:center;padding:50px 20px;color:var(--mu);}
.ci{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px;}
.cii{width:58px;height:58px;background:var(--cc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;}
.cin{flex:1;}
.cinm{font-weight:600;font-size:0.9rem;}
.cis{font-size:0.76rem;color:var(--mu);}
.qc{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qb{width:25px;height:25px;border-radius:50%;border:1px solid var(--bd);background:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.qb:hover{background:var(--gl);}
.qq{font-size:0.86rem;font-weight:600;min-width:20px;text-align:center;}
.rm{background:none;border:none;color:var(--mu);font-size:1rem;cursor:pointer;padding:4px;}
.rm:hover{color:var(--rd);}
.cs{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:18px;margin-top:18px;max-width:600px;}
.csr{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.88rem;}
.csr.tot{font-weight:700;font-size:0.98rem;padding-top:8px;border-top:1px solid var(--bd);margin-top:8px;}
.chkb{width:100%;background:var(--go);color:#1a1a1a;border:none;padding:12px;font-size:0.92rem;font-weight:700;border-radius:6px;margin-top:12px;}
.chkb:hover{background:#b8973d;}
/* CHECKOUT */
.ck{max-width:620px;margin:0 auto;}
.strack{display:flex;align-items:center;margin-bottom:28px;}
.sci{display:flex;flex-direction:column;align-items:center;flex:1;}
.scc{width:30px;height:30px;border-radius:50%;border:2px solid var(--bd);background:#fff;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:600;color:var(--mu);}
.scc.dn{background:var(--go);border-color:var(--go);color:#fff;}
.scc.at{background:var(--g);border-color:var(--g);color:#fff;}
.scl{font-size:0.68rem;color:var(--mu);margin-top:3px;}
.sli{flex:1;height:2px;background:var(--bd);}
.sli.dn{background:var(--go);}
.cpanel{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:26px;}
.ch{font-family:'Playfair Display',serif;font-size:1.15rem;margin-bottom:16px;}
.fr{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.fg{flex:1;min-width:160px;}
.fg label{display:block;font-size:0.76rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--mu);margin-bottom:4px;}
.fg input,.fg select{width:100%;border:1px solid var(--bd);border-radius:4px;padding:8px 10px;font-size:0.86rem;font-family:'Poppins',sans-serif;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--g);}
.bn{background:var(--g);color:#fff;border:none;padding:11px 28px;font-size:0.88rem;font-weight:600;border-radius:6px;cursor:pointer;}
.bn:hover{background:var(--gd);}
.bb{background:transparent;border:1px solid var(--bd);color:var(--mu);padding:9px 20px;font-size:0.85rem;border-radius:6px;cursor:pointer;margin-right:8px;}
.ol{display:flex;justify-content:space-between;font-size:0.86rem;padding:5px 0;border-bottom:1px solid var(--bd);}
.sec-note{background:var(--gl);border:1px solid var(--g);border-radius:6px;padding:9px 12px;font-size:0.78rem;color:var(--g);margin-bottom:14px;}
.conf{text-align:center;padding:24px 0;}
.conf-ic{font-size:2.8rem;margin-bottom:12px;}
.conf h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px;}
.conf p{color:var(--mu);font-size:0.88rem;max-width:340px;margin:0 auto 18px;}
.onum{background:#fdf7ea;border:1px solid var(--go);border-radius:6px;padding:8px 16px;font-size:0.86rem;font-weight:600;color:#7a6020;display:inline-block;margin-bottom:18px;}
/* SURVEY */
.sv{max-width:560px;margin:0 auto;}
.sin{color:var(--mu);font-size:0.9rem;line-height:1.7;margin-bottom:22px;}
.sq{margin-bottom:20px;}
.sq .qt{font-weight:600;font-size:0.9rem;margin-bottom:9px;}
.stars{display:flex;gap:5px;}
.star{font-size:1.5rem;cursor:pointer;color:#ddd;transition:color 0.1s;user-select:none;}
.star.on{color:var(--go);}
.radios{display:flex;flex-direction:column;gap:7px;}
.ro{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.87rem;}
.ro input{accent-color:var(--g);}
.sta{width:100%;border:1px solid var(--bd);border-radius:4px;padding:9px;font-size:0.87rem;resize:vertical;min-height:80px;font-family:'Poppins',sans-serif;}
.sta:focus{outline:none;border-color:var(--g);}
.ssub{background:var(--g);color:#fff;border:none;padding:11px 28px;font-size:0.88rem;font-weight:600;border-radius:6px;cursor:pointer;}
.sthnk{text-align:center;padding:20px 0;}
.sthnk h3{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:8px;}
.sthnk p{color:var(--mu);font-size:0.87rem;}
/* TOAST */
.toast{position:fixed;bottom:24px;right:20px;background:#1a1a1a;color:#fff;padding:11px 18px;border-radius:6px;font-size:0.86rem;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:fi 0.25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.divider{border:none;border-top:1px solid var(--bd);margin:28px 0;}
@media(max-width:700px){.shl{flex-direction:column;}.sb{width:100%;}.dl{flex-direction:column;}.dim{flex:none;width:100%;}}
</style>
</head>
<body>

<div class="deal">&#128293; End of Season Sale &mdash; Up to 40% off selected boots and jerseys. Shop now!</div>

<nav class="nav">
  <div class="ni">
    <span class="nb" onclick="goPage('home')">Pitch<span>Store</span></span>
    <a class="bkl" href="../index.html">&#8592; Portfolio</a>
    <div class="nl">
      <button class="nbt" id="navShop" onclick="goPage('shop')">Shop</button>
      <button class="nbt" id="navSurvey" onclick="goPage('survey')">Survey</button>
      <button class="cb" onclick="goPage('cart')">
        &#128722; Cart <span class="cbadge" id="cartBadge" style="display:none">0</span>
      </button>
    </div>
  </div>
</nav>

<div id="app"></div>
<div id="toastEl" class="toast" style="display:none"></div>

<script>
// ── DATA ──
var PRODUCTS=[
  {id:1,n:"Phantom Elite FG",br:"Nike",cat:"Boots",em:"&#128095;",col:"Black",sz:["7","8","9","10","11"],p:220,w:null,d:"Precision fit boot with adaptive traction for firm ground. Engineered for explosive acceleration."},
  {id:2,n:"Predator Pro",br:"Adidas",cat:"Boots",em:"&#9917;",col:"Red",sz:["7","8","9","10"],p:180,w:240,d:"Classic Predator zones give you unmatched ball control. On sale while stocks last."},
  {id:3,n:"Superfly VIII",br:"Nike",cat:"Boots",em:"&#128095;",col:"Blue",sz:["6","7","8","9"],p:199,w:null,d:"Speed meets control — lightweight knit upper with carbon fibre soleplate."},
  {id:4,n:"King Pro FG",br:"Puma",cat:"Boots",em:"&#128095;",col:"White",sz:["8","9","10","11","12"],p:150,w:185,d:"A modern take on Puma's iconic King silhouette. Supple leather upper."},
  {id:5,n:"Home Kit 2025",br:"Nike",cat:"Jerseys",em:"&#128085;",col:"White",sz:["S","M","L","XL"],p:99,w:null,d:"Authentic replica home jersey with breathable Dri-FIT fabric."},
  {id:6,n:"Away Kit 2025",br:"Adidas",cat:"Jerseys",em:"&#128085;",col:"Blue",sz:["S","M","L","XL","XXL"],p:89,w:115,d:"Bold away strip in signature blue. HEAT.RDY technology keeps you cool."},
  {id:7,n:"Training Top",br:"Puma",cat:"Jerseys",em:"&#127949;",col:"Green",sz:["S","M","L","XL"],p:55,w:null,d:"Everyday training top with dryCELL moisture management."},
  {id:8,n:"Pro Shield Guards",br:"Nike",cat:"Shin Guards",em:"&#128737;",col:"Black",sz:["S","M","L"],p:35,w:null,d:"Anatomically shaped shields with ankle support for the full 90 minutes."},
  {id:9,n:"Shin Air Lite",br:"Adidas",cat:"Shin Guards",em:"&#128737;",col:"White",sz:["S","M","L","XL"],p:28,w:38,d:"Ultra-light slip-in guards with perforated shell for ventilation."},
  {id:10,n:"Keepersport GK Pro",br:"Puma",cat:"Gloves",em:"&#129354;",col:"Black",sz:["7","8","9","10"],p:65,w:null,d:"Negative cut latex palm for superior grip and a close ball feel."},
  {id:11,n:"GK React II",br:"Nike",cat:"Gloves",em:"&#129354;",col:"Blue",sz:["7","8","9","10","11"],p:58,w:75,d:"Palm foam engineered for wet and dry conditions with finger support."},
  {id:12,n:"Team Bag 35L",br:"Adidas",cat:"Bags",em:"&#127920;",col:"Black",sz:["One Size"],p:72,w:null,d:"Dedicated boot compartment, separate ball net, and padded laptop sleeve."},
  {id:13,n:"Pro Kit Bag",br:"Nike",cat:"Bags",em:"&#128076;",col:"Blue",sz:["One Size"],p:85,w:110,d:"Spacious main compartment, side water bottle pockets, reflective branding."},
  {id:14,n:"Speedframe FG",br:"Puma",cat:"Boots",em:"&#128095;",col:"Yellow",sz:["6","7","8","9","10"],p:130,w:null,d:"Split outsole for explosive speed. Perfect for wide players."},
  {id:15,n:"Club Jersey",br:"Puma",cat:"Jerseys",em:"&#128085;",col:"Red",sz:["S","M","L","XL","XXL"],p:48,w:null,d:"Standard club jersey for training. dryCELL fabric, relaxed fit."},
  {id:16,n:"Lite Guard",br:"Nike",cat:"Shin Guards",em:"&#128737;",col:"Green",sz:["S","M","L"],p:22,w:null,d:"Entry-level guard for youth and recreational players."},
];
var CATS=["Boots","Jerseys","Shin Guards","Gloves","Bags"];
var BRANDS=["Nike","Adidas","Puma"];
var COLORS=["Black","White","Blue","Red","Green","Yellow"];
var PRANGES=[{l:"Under $50",mn:0,mx:50},{l:"$50\u2013$100",mn:50,mx:100},{l:"$100\u2013$200",mn:100,mx:200},{l:"Over $200",mn:200,mx:9999}];

// ── STATE ──
var ST={
  page:'home', // home|shop|detail|cart|checkout|survey
  detailId:null,
  cart:[],
  // shop filters
  cats:[],brands:[],cols:[],pr:null,pmin:'',pmax:'',sort:'default',
  // checkout
  ckStep:0,
  form:{fn:'',ln:'',em:'',addr:'',city:'',postal:'',country:'Canada',card:'',exp:'',cvv:'',name:''},
  orderNum:'',
  // survey
  rating:0,ease:'',rec:'',comment:'',surveySent:false
};

function goPage(p){ST.page=p;if(p==='checkout')ST.ckStep=0;render();}

// ── CART ──
function addToCart(prod,size){
  var idx=ST.cart.findIndex(function(i){return i.id===prod.id&&i.size===size;});
  if(idx>=0) ST.cart[idx].qty++;
  else ST.cart.push({id:prod.id,n:prod.n,br:prod.br,p:prod.p,size:size,qty:1});
  updateBadge();
  showToast(prod.n+' added to cart');
}
function updateBadge(){
  var total=ST.cart.reduce(function(s,i){return s+i.qty;},0);
  var b=document.getElementById('cartBadge');
  if(b){b.textContent=total;b.style.display=total>0?'inline':'none';}
}
function showToast(msg){
  var t=document.getElementById('toastEl');
  t.innerHTML='<span>&#10003;</span> '+msg;
  t.style.display='flex';
  clearTimeout(window._tt);
  window._tt=setTimeout(function(){t.style.display='none';},2200);
}

// ── RENDER DISPATCH ──
function render(){
  var app=document.getElementById('app');
  if(ST.page==='home') app.innerHTML=homeHTML();
  else if(ST.page==='shop') app.innerHTML=shopHTML();
  else if(ST.page==='detail') app.innerHTML=detailHTML();
  else if(ST.page==='cart') app.innerHTML=cartHTML();
  else if(ST.page==='checkout') app.innerHTML=checkoutHTML();
  else if(ST.page==='survey') app.innerHTML=surveyHTML();
  updateBadge();
  // restore nav active
  ['navShop','navSurvey'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.className='nbt';
  });
  if(ST.page==='shop'||ST.page==='detail'){var e=document.getElementById('navShop');if(e)e.className='nbt act';}
  if(ST.page==='survey'){var e=document.getElementById('navSurvey');if(e)e.className='nbt act';}
}

// ── HOME ──
function homeHTML(){
  var deals=PRODUCTS.filter(function(p){return p.w;}).slice(0,4);
  var h='<div class="hero"><div class="hi">';
  h+='<p class="hey">The Footballer\'s Store</p>';
  h+='<h1>Gear that keeps up<br/>with your <span>game.</span></h1>';
  h+='<p>Professional-grade boots, jerseys, and accessories. Free shipping on orders over $100.</p>';
  h+='<span class="hcta" onclick="goPage(\'shop\')">Shop the Collection &#8594;</span>';
  h+='</div></div>';
  h+='<div class="pw">';
  h+='<span class="sl">On Sale Now</span><h2 class="st">Don\'t miss these deals</h2>';
  h+='<div class="pg" style="margin-bottom:36px;">'+deals.map(function(p){return cardHTML(p);}).join('')+'</div>';
  h+='<hr class="divider"/>';
  h+='<div style="text-align:center;padding:24px 0;">';
  h+='<p style="color:var(--mu);font-size:0.9rem;margin-bottom:14px;">Loved shopping with us? We\'d love to hear what you think.</p>';
  h+='<button onclick="goPage(\'survey\')" style="background:none;border:1px solid var(--g);color:var(--g);padding:9px 22px;border-radius:4px;font-size:0.85rem;cursor:pointer;">Share your feedback &#8594;</button>';
  h+='</div></div>';
  return h;
}

function cardHTML(p){
  var disc=p.w?Math.round((1-p.p/p.w)*100):null;
  var h='<div class="pc">';
  h+='<div class="pim" onclick="openDetail('+p.id+')">';
  if(disc)h+='<span class="sb2">-'+disc+'%</span>';
  h+='<span>'+p.em+'</span></div>';
  h+='<div class="pb">';
  h+='<div class="pbr">'+p.br+'</div>';
  h+='<div class="pn" onclick="openDetail('+p.id+')">'+p.n+'</div>';
  h+='<div class="pcat">'+p.cat+'</div>';
  h+='<div class="pr"><span class="pnw">$'+p.p+'</span>'+(p.w?'<span class="pws">$'+p.w+'</span>':'')+'</div>';
  h+='<button class="ab" onclick="quickAdd('+p.id+')">Add to Cart</button>';
  h+='</div></div>';
  return h;
}

function quickAdd(id){
  var p=PRODUCTS.find(function(x){return x.id===id;});
  if(p) addToCart(p,p.sz[0]);
}
function openDetail(id){ST.detailId=id;ST.page='detail';ST.selectedSize=null;ST.sizeErr=false;render();}

// ── SHOP ──
function filtered(){
  return PRODUCTS.filter(function(p){
    if(ST.cats.length&&ST.cats.indexOf(p.cat)<0)return false;
    if(ST.brands.length&&ST.brands.indexOf(p.br)<0)return false;
    if(ST.cols.length&&ST.cols.indexOf(p.col)<0)return false;
    if(ST.pr&&(p.p<ST.pr.mn||p.p>ST.pr.mx))return false;
    if(ST.pmin!==''&&p.p<parseFloat(ST.pmin))return false;
    if(ST.pmax!==''&&p.p>parseFloat(ST.pmax))return false;
    return true;
  }).sort(function(a,b){
    if(ST.sort==='price-asc')return a.p-b.p;
    if(ST.sort==='price-desc')return b.p-a.p;
    if(ST.sort==='name')return a.n.localeCompare(b.n);
    return 0;
  });
}

function shopHTML(){
  var items=filtered();
  var activeTags=[];
  ST.cats.forEach(function(c){activeTags.push({l:c,rm:"rmCat('"+c+"')"});});
  ST.brands.forEach(function(b){activeTags.push({l:b,rm:"rmBrand('"+b+"')"});});
  ST.cols.forEach(function(c){activeTags.push({l:c,rm:"rmCol('"+c+"')"});});
  if(ST.pr)activeTags.push({l:ST.pr.l,rm:'rmPr()'});
  var h='<div class="pw">';
  h+='<span class="sl">Shop</span><h2 class="st">All Products</h2>';
  h+='<p class="sd">Browse '+PRODUCTS.length+' products. Use the filters to narrow your search.</p>';
  if(activeTags.length){
    h+='<div class="af">';
    activeTags.forEach(function(t){h+='<span class="at">'+t.l+'<button onclick="'+t.rm+'">&#215;</button></span>';});
    h+='<button class="clr" onclick="clearAll()">Clear all</button>';
    h+='</div>';
  }
  h+='<div class="shl">';
  // sidebar
  h+='<aside class="sb">';
  h+=filterSection('Category',CATS,'cats');
  h+=filterSection('Brand',BRANDS,'brands');
  h+=priceSection();
  h+=filterSection('Color',COLORS,'cols');
  h+='<button class="clr" onclick="clearAll()">Clear all filters</button>';
  h+='</aside>';
  // products
  h+='<div class="pa">';
  h+='<div class="rb"><span class="rc">Showing <b>'+items.length+'</b> of '+PRODUCTS.length+' products</span>';
  h+='<select class="ss" onchange="setSort(this.value)">';
  h+='<option value="default"'+(ST.sort==='default'?' selected':'')+'>Sort: Default</option>';
  h+='<option value="price-asc"'+(ST.sort==='price-asc'?' selected':'')+'>Price: Low to High</option>';
  h+='<option value="price-desc"'+(ST.sort==='price-desc'?' selected':'')+'>Price: High to Low</option>';
  h+='<option value="name"'+(ST.sort==='name'?' selected':'')+'>Name A&#8211;Z</option>';
  h+='</select></div>';
  if(items.length===0){
    h+='<div class="ne"><div style="font-size:2.2rem;">&#128269;</div><p style="margin-top:10px;">No products match your filters. Try removing some.</p></div>';
  } else {
    h+='<div class="pg">'+items.map(function(p){return cardHTML(p);}).join('')+'</div>';
  }
  h+='</div></div></div>';
  return h;
}

function filterSection(title,opts,key){
  var h='<div class="fc"><div class="ft">'+title+'</div>';
  opts.forEach(function(o){
    var checked=ST[key].indexOf(o)>=0;
    var count=PRODUCTS.filter(function(p){return p.cat===o||p.br===o||p.col===o;}).length;
    h+='<label class="fo"><input type="checkbox"'+(checked?' checked':'')+' onchange="toggleFilter(\''+key+'\',\''+o+'\',this.checked)"/>';
    h+='<label>'+o+' <b>('+count+')</b></label></label>';
  });
  h+='</div>';
  return h;
}
function priceSection(){
  var h='<div class="fc"><div class="ft">Price Range</div>';
  PRANGES.forEach(function(r){
    var checked=ST.pr&&ST.pr.l===r.l;
    h+='<label class="fo"><input type="radio" name="pr"'+(checked?' checked':'')+' onchange="setPr(\''+r.l+'\')"/><label>'+r.l+'</label></label>';
  });
  h+='<div class="ft" style="margin-top:10px;">Custom Range</div>';
  h+='<div class="pi"><input type="number" placeholder="Min" value="'+ST.pmin+'" onchange="ST.pmin=this.value;render()" style="padding:5px 7px;font-size:0.8rem;"/>';
  h+='<span style="color:var(--mu);">&#8211;</span>';
  h+='<input type="number" placeholder="Max" value="'+ST.pmax+'" onchange="ST.pmax=this.value;render()" style="padding:5px 7px;font-size:0.8rem;"/></div>';
  h+='</div>';
  return h;
}
function toggleFilter(key,val,checked){
  if(checked) ST[key].push(val);
  else ST[key]=ST[key].filter(function(v){return v!==val;});
  render();
}
function rmCat(v){ST.cats=ST.cats.filter(function(x){return x!==v;});render();}
function rmBrand(v){ST.brands=ST.brands.filter(function(x){return x!==v;});render();}
function rmCol(v){ST.cols=ST.cols.filter(function(x){return x!==v;});render();}
function rmPr(){ST.pr=null;render();}
function clearAll(){ST.cats=[];ST.brands=[];ST.cols=[];ST.pr=null;ST.pmin='';ST.pmax='';render();}
function setPr(label){ST.pr=PRANGES.find(function(r){return r.l===label;});render();}
function setSort(v){ST.sort=v;render();}

// ── DETAIL ──
function detailHTML(){
  var p=PRODUCTS.find(function(x){return x.id===ST.detailId;});
  if(!p)return'<div class="pw"><p>Product not found.</p></div>';
  var disc=p.w?Math.round((1-p.p/p.w)*100):null;
  var h='<div class="pw">';
  h+='<button class="bk" onclick="goPage(\'shop\')">&#8592; Back to all products</button>';
  h+='<div class="dl">';
  h+='<div class="dim">'+p.em+'</div>';
  h+='<div class="di">';
  h+='<div class="dib">'+p.br+'</div>';
  h+='<div class="dn">'+p.n+'</div>';
  h+='<div style="display:flex;align-items:center;margin-bottom:14px;"><span class="dp">$'+p.p+'</span>'+(p.w?'<span class="dw">$'+p.w+'</span>':'')+(disc?'<span class="sb2" style="margin-left:10px;">-'+disc+'%</span>':'')+'</div>';
  h+='<p class="dd">'+p.d+'</p>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">';
  h+='<span style="background:var(--cc);border:1px solid var(--bd);border-radius:4px;padding:3px 11px;font-size:0.78rem;">'+p.cat+'</span>';
  h+='<span style="background:var(--cc);border:1px solid var(--bd);border-radius:4px;padding:3px 11px;font-size:0.78rem;">'+p.col+'</span>';
  h+='<span style="background:var(--cc);border:1px solid var(--bd);border-radius:4px;padding:3px 11px;font-size:0.78rem;">'+p.br+'</span>';
  h+='</div>';
  if(p.sz.length>1){
    h+='<div class="szl">Select Size'+(ST.sizeErr?' <span class="se">&#8212; please choose a size</span>':'')+'</div>';
    h+='<div class="szg">';
    p.sz.forEach(function(s){h+='<button class="szo'+(ST.selectedSize===s?' sel':'')+'" onclick="selSize(\''+s+'\')">'+s+'</button>';});
    h+='</div>';
  }
  h+='<button class="dadb" onclick="detailAdd('+p.id+')">Add to Cart</button>';
  h+='</div></div></div>';
  return h;
}
function selSize(s){ST.selectedSize=s;ST.sizeErr=false;render();}
function detailAdd(id){
  var p=PRODUCTS.find(function(x){return x.id===id;});
  if(p.sz.length>1&&!ST.selectedSize){ST.sizeErr=true;render();return;}
  addToCart(p,ST.selectedSize||p.sz[0]);
}

// ── CART ──
function cartHTML(){
  if(ST.cart.length===0){
    return'<div class="pw"><div class="ce"><div style="font-size:2.8rem;">&#128722;</div><h2 style="font-family:\'Playfair Display\',serif;margin-top:10px;">Your cart is empty</h2><p style="margin-top:8px;font-size:0.88rem;color:var(--mu);">Head to the shop to add some gear.</p><button onclick="goPage(\'shop\')" style="margin-top:16px;background:var(--g);color:#fff;border:none;padding:10px 26px;border-radius:6px;font-size:0.88rem;font-weight:600;cursor:pointer;">Browse Products</button></div></div>';
  }
  var sub=ST.cart.reduce(function(s,i){return s+i.p*i.qty;},0);
  var ship=sub>=100?0:9.99;
  var tot=sub+ship;
  var h='<div class="pw" style="max-width:680px;margin:0 auto;">';
  h+='<h2 class="st">Your Cart</h2>';
  h+='<p class="sd">'+ST.cart.reduce(function(s,i){return s+i.qty;},0)+' item(s)</p>';
  ST.cart.forEach(function(item,idx){
    var pr=PRODUCTS.find(function(x){return x.id===item.id;});
    h+='<div class="ci">';
    h+='<div class="cii">'+(pr?pr.em:'')+'</div>';
    h+='<div class="cin"><div class="cinm">'+item.n+'</div><div class="cis">'+item.br+' &middot; Size: '+item.size+'</div>';
    h+='<div class="qc"><button class="qb" onclick="adjQty('+idx+',-1)">&#8722;</button><span class="qq">'+item.qty+'</span><button class="qb" onclick="adjQty('+idx+',1)">+</button></div></div>';
    h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">';
    h+='<span style="font-weight:700;font-size:0.93rem;">$'+(item.p*item.qty).toFixed(2)+'</span>';
    h+='<button class="rm" onclick="removeItem('+idx+')">&#10005;</button></div></div>';
  });
  h+='<div class="cs">';
  h+='<div class="csr"><span>Subtotal</span><span>$'+sub.toFixed(2)+'</span></div>';
  h+='<div class="csr"><span>Shipping</span><span>'+(ship===0?'Free':'$'+ship.toFixed(2))+'</span></div>';
  if(ship>0)h+='<p style="font-size:0.76rem;color:var(--mu);">Add $'+(100-sub).toFixed(2)+' more for free shipping.</p>';
  h+='<div class="csr tot"><span>Total</span><span>$'+tot.toFixed(2)+'</span></div>';
  h+='<button class="chkb" onclick="goPage(\'checkout\')">Proceed to Checkout &#8594;</button>';
  h+='</div></div>';
  return h;
}
function adjQty(idx,d){
  ST.cart[idx].qty+=d;
  if(ST.cart[idx].qty<=0)ST.cart.splice(idx,1);
  updateBadge();render();
}
function removeItem(idx){ST.cart.splice(idx,1);updateBadge();render();}

// ── CHECKOUT ──
function checkoutHTML(){
  var steps=['Info','Payment','Review','Confirmed'];
  var h='<div class="pw"><div class="ck">';
  h+='<div class="strack">';
  steps.forEach(function(s,i){
    h+='<div class="sci"><div class="scc'+(i<ST.ckStep?' dn':i===ST.ckStep?' at':'')+'">'+( i<ST.ckStep?'&#10003;':i+1)+'</div><div class="scl">'+s+'</div></div>';
    if(i<steps.length-1)h+='<div class="sli'+(i<ST.ckStep?' dn':'')+'"></div>';
  });
  h+='</div>';
  h+='<div class="cpanel">';
  if(ST.ckStep===0) h+=ckInfo();
  else if(ST.ckStep===1) h+=ckPay();
  else if(ST.ckStep===2) h+=ckReview();
  else h+=ckConfirm();
  h+='</div></div></div>';
  return h;
}
function ckInfo(){
  var f=ST.form;
  return '<h3 class="ch">Delivery Information</h3>'+
    '<div class="fr"><div class="fg"><label>First Name</label><input value="'+f.fn+'" oninput="ST.form.fn=this.value" placeholder="Majd"/></div>'+
    '<div class="fg"><label>Last Name</label><input value="'+f.ln+'" oninput="ST.form.ln=this.value" placeholder="Al Khori"/></div></div>'+
    '<div class="fr"><div class="fg"><label>Email</label><input type="email" value="'+f.em+'" oninput="ST.form.em=this.value" placeholder="you@example.com"/></div></div>'+
    '<div class="fr"><div class="fg"><label>Street Address</label><input value="'+f.addr+'" oninput="ST.form.addr=this.value" placeholder="123 Main St"/></div></div>'+
    '<div class="fr"><div class="fg"><label>City</label><input value="'+f.city+'" oninput="ST.form.city=this.value" placeholder="Ottawa"/></div>'+
    '<div class="fg"><label>Postal Code</label><input value="'+f.postal+'" oninput="ST.form.postal=this.value" placeholder="K1P 1A4"/></div></div>'+
    '<div class="fr"><div class="fg"><label>Country</label><select onchange="ST.form.country=this.value"><option>Canada</option><option>United States</option><option>United Kingdom</option></select></div></div>'+
    '<button class="bn" onclick="ST.ckStep=1;render()">Continue to Payment &#8594;</button>';
}
function ckPay(){
  var f=ST.form;
  return '<h3 class="ch">Payment Details</h3>'+
    '<div class="fr"><div class="fg"><label>Name on Card</label><input value="'+f.name+'" oninput="ST.form.name=this.value" placeholder="Majd Al Khori"/></div></div>'+
    '<div class="fr"><div class="fg"><label>Card Number</label><input value="'+f.card+'" oninput="ST.form.card=this.value" placeholder="&bull;&bull;&bull;&bull; &bull;&bull;&bull;&bull; &bull;&bull;&bull;&bull; &bull;&bull;&bull;&bull;" maxlength="19"/></div></div>'+
    '<div class="fr"><div class="fg"><label>Expiry</label><input value="'+f.exp+'" oninput="ST.form.exp=this.value" placeholder="MM/YY" maxlength="5"/></div>'+
    '<div class="fg"><label>CVV</label><input value="'+f.cvv+'" oninput="ST.form.cvv=this.value" placeholder="&bull;&bull;&bull;" maxlength="4"/></div></div>'+
    '<div class="sec-note">&#128274; Your payment info is secure. This is a prototype &mdash; no real charges will be made.</div>'+
    '<button class="bb" onclick="ST.ckStep=0;render()">&#8592; Back</button>'+
    '<button class="bn" onclick="ST.ckStep=2;render()">Review Order &#8594;</button>';
}
function ckReview(){
  var sub=ST.cart.reduce(function(s,i){return s+i.p*i.qty;},0);
  var ship=sub>=100?0:9.99;
  var tot=sub+ship;
  var h='<h3 class="ch">Review Your Order</h3>';
  ST.cart.forEach(function(item){
    h+='<div class="ol"><span>'+item.n+' &times; '+item.qty+' ('+item.size+')</span><span>$'+(item.p*item.qty).toFixed(2)+'</span></div>';
  });
  h+='<div class="ol"><span>Subtotal</span><span>$'+sub.toFixed(2)+'</span></div>';
  h+='<div class="ol"><span>Shipping</span><span>'+(ship===0?'Free':'$'+ship.toFixed(2))+'</span></div>';
  h+='<div class="ol" style="font-weight:700;border-bottom:none;padding-top:6px;"><span>Total</span><span>$'+tot.toFixed(2)+'</span></div>';
  h+='<div style="margin-top:16px;"><button class="bb" onclick="ST.ckStep=1;render()">&#8592; Back</button>';
  h+='<button class="bn" onclick="placeOrder()">Place Order &#8594;</button></div>';
  return h;
}
function ckConfirm(){
  return '<div class="conf"><div class="conf-ic">&#9989;</div><h2>Order Confirmed!</h2>'+
    '<p>Thank you, '+ST.form.fn+'. Your gear is on its way. A confirmation will be sent to '+ST.form.em+'.</p>'+
    '<div class="onum">Order '+ST.orderNum+'</div><br/>'+
    '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">'+
    '<button onclick="goPage(\'home\')" class="bn">Back to Home</button>'+
    '<button onclick="goPage(\'survey\')" class="bb">Leave a Review</button></div></div>';
}
function placeOrder(){
  ST.orderNum='PS-'+Math.floor(100000+Math.random()*900000);
  ST.cart=[];updateBadge();ST.ckStep=3;render();
}

// ── SURVEY ──
function surveyHTML(){
  if(ST.surveySent){
    return'<div class="pw"><div class="sv"><div class="sthnk"><div style="font-size:2.2rem;margin-bottom:12px;">&#128154;</div><h3>Thank you for your feedback!</h3><p>Your thoughts help us make PitchStore better for every player.</p></div></div></div>';
  }
  var h='<div class="pw"><div class="sv">';
  h+='<span class="sl">Your Opinion Matters</span>';
  h+='<h2 class="st" style="margin-bottom:6px;">How was your experience?</h2>';
  h+='<p class="sin">It takes less than two minutes. Your honest feedback helps us improve every part of PitchStore &mdash; from the products we stock to the checkout experience. We read every response. &#9917;</p>';
  // Q1 stars
  h+='<div class="sq"><div class="qt">Overall, how would you rate your experience?</div>';
  h+='<div class="stars" id="stars">';
  for(var i=1;i<=5;i++){
    h+='<span class="star'+(i<=ST.rating?' on':'')+'" onclick="setStar('+i+')" onmouseover="hoverStar('+i+')" onmouseout="unhover()">&#9733;</span>';
  }
  h+='</div></div>';
  // Q2
  h+='<div class="sq"><div class="qt">How easy was it to find what you were looking for?</div><div class="radios">';
  ['Very easy','Easy','Neutral','Difficult','Very difficult'].forEach(function(o){
    h+='<label class="ro"><input type="radio" name="ease" value="'+o+'"'+(ST.ease===o?' checked':'')+' onchange="ST.ease=this.value"/> '+o+'</label>';
  });
  h+='</div></div>';
  // Q3
  h+='<div class="sq"><div class="qt">Would you recommend PitchStore to a teammate?</div><div class="radios">';
  ['Definitely yes','Probably yes','Not sure','Probably not','No'].forEach(function(o){
    h+='<label class="ro"><input type="radio" name="rec" value="'+o+'"'+(ST.rec===o?' checked':'')+' onchange="ST.rec=this.value"/> '+o+'</label>';
  });
  h+='</div></div>';
  // Q4
  h+='<div class="sq"><div class="qt">Anything else you\'d like us to know?</div>';
  h+='<textarea class="sta" placeholder="Tell us what worked well or what we could improve..." oninput="ST.comment=this.value">'+ST.comment+'</textarea></div>';
  h+='<button class="ssub" onclick="submitSurvey()">Submit Feedback</button>';
  h+='</div></div>';
  return h;
}
function setStar(n){ST.rating=n;render();}
function hoverStar(n){var ss=document.querySelectorAll('.star');ss.forEach(function(s,i){s.className='star'+(i<n?' on':'');});}
function unhover(){var ss=document.querySelectorAll('.star');ss.forEach(function(s,i){s.className='star'+(i<ST.rating?' on':'');});}
function submitSurvey(){ST.surveySent=true;render();}

// ── INIT ──
render();
</script>
</body>
</html>
