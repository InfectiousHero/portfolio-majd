<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Football Stats Dashboard / Tableau de Bord Football</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--g:#1a6b3a;--gd:#14532d;--gl:#eaf2ec;--go:#c9a84c;--cr:#f5f0e8;--cc:#ede7d6;--ink:#1a1a1a;--mu:#6b6b6b;--bd:#e3dcc9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--cr);color:var(--ink);}
.nav{background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;}
.ni{max-width:1100px;margin:0 auto;padding:0 20px;height:54px;display:flex;align-items:center;gap:12px;}
.nb{font-family:'Playfair Display',serif;font-size:1.1rem;}
.nb span{color:var(--g);}
.syn{background:#fdf7ea;border:1px solid var(--go);color:#7a6020;font-size:0.68rem;padding:3px 9px;border-radius:12px;font-weight:600;}
.nr{margin-left:auto;display:flex;align-items:center;gap:10px;}
.bkl{font-size:0.76rem;color:var(--mu);text-decoration:none;}
.bkl:hover{color:var(--g);}
.ltog{display:flex;border:1.5px solid var(--bd);border-radius:20px;overflow:hidden;}
.lbtn{background:none;border:none;padding:5px 14px;font-size:0.78rem;font-weight:600;cursor:pointer;color:var(--mu);font-family:'Poppins',sans-serif;}
.lbtn.on{background:var(--g);color:#fff;}
.hero{background:var(--ink);color:#fff;padding:36px 20px;}
.hi{max-width:1100px;margin:0 auto;}
.hey{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--go);font-weight:600;margin-bottom:8px;}
.hero h1{font-family:'Playfair Display',serif;font-size:1.9rem;line-height:1.2;margin-bottom:10px;}
.hero h1 span{color:var(--go);}
.hero-sub{color:rgba(255,255,255,0.5);font-size:0.86rem;max-width:540px;line-height:1.7;}
.hero-meta{margin-top:12px;font-size:0.72rem;color:rgba(255,255,255,0.28);}
.pw{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
.sl{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.13em;color:var(--g);font-weight:600;margin-bottom:4px;display:block;}
.st{font-family:'Playfair Display',serif;font-size:1.35rem;margin-bottom:6px;}
.sd{color:var(--mu);font-size:0.84rem;margin-bottom:18px;max-width:600px;line-height:1.6;}
.div{border:none;border-top:1px solid var(--bd);margin:32px 0;}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px;}
.kc{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:15px 17px;}
.kv{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--g);line-height:1;}
.kl{font-size:0.72rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.07em;margin-top:4px;}
.cc{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:26px;margin-bottom:26px;}
.ch{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
.ct{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:2px;}
.cx{font-size:0.78rem;color:var(--mu);max-width:460px;line-height:1.5;}
.ctrls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.cl{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--mu);font-weight:600;}
.cs{border:1px solid var(--bd);border-radius:6px;padding:5px 9px;font-size:0.8rem;background:#fff;color:var(--ink);font-family:'Poppins',sans-serif;}
.cs:focus{outline:none;border-color:var(--g);}
.ptogs{display:flex;gap:6px;flex-wrap:wrap;}
.pt{border:1.5px solid var(--bd);background:#fff;border-radius:4px;padding:4px 11px;font-size:0.76rem;cursor:pointer;font-family:'Poppins',sans-serif;color:var(--mu);}
.pt.on{color:#fff;border-color:transparent;}
.cw{position:relative;width:100%;}
.foot{text-align:center;font-size:0.72rem;color:var(--mu);margin-top:18px;padding-top:16px;border-top:1px solid var(--bd);}
@media(max-width:640px){.ch{flex-direction:column;}.krow{grid-template-columns:repeat(2,1fr);}.hero h1{font-size:1.5rem;}}
</style>
</head>
<body>
<nav class="nav">
  <div class="ni">
    <span class="nb">Pitch<span>Stats</span></span>
    <span class="syn" id="synBadge">Synthetic Data</span>
    <div class="nr">
      <a class="bkl" href="../index.html" id="backLnk">&#8592; Portfolio</a>
      <div class="ltog">
        <button class="lbtn on" id="btnEN" onclick="setLang('en')">EN</button>
        <button class="lbtn" id="btnFR" onclick="setLang('fr')">FR</button>
      </div>
    </div>
  </div>
</nav>

<div class="hero" id="heroSec">
  <div class="hi">
    <p class="hey" id="heroEy"></p>
    <h1 id="heroH1"></h1>
    <p class="hero-sub" id="heroSub"></p>
    <p class="hero-meta" id="heroMeta"></p>
  </div>
</div>

<div class="pw">
  <span class="sl" id="sec1Lbl"></span>
  <h2 class="st" id="sec1Title"></h2>
  <div class="krow" id="kpiRow"></div>
  <hr class="div"/>
  <span class="sl" id="sec2Lbl"></span>
  <h2 class="st" id="sec2Title"></h2>
  <p class="sd" id="sec2Desc"></p>
  <div class="cc">
    <div class="ch">
      <div>
        <div class="ct" id="lChartTitle"></div>
        <div class="cx" id="lChartCtx"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-end;">
        <div class="ctrls">
          <span class="cl" id="fromLbl"></span>
          <select class="cs" id="fromSel" onchange="setFrom(this.value)"></select>
          <span class="cl" id="toLbl"></span>
          <select class="cs" id="toSel" onchange="setTo(this.value)"></select>
        </div>
        <div class="ctrls">
          <span class="cl" id="playersLbl"></span>
          <div class="ptogs" id="playerToggles"></div>
        </div>
      </div>
    </div>
    <div class="cw"><canvas id="lineChart" height="260"></canvas></div>
  </div>
  <hr class="div"/>
  <span class="sl" id="sec3Lbl"></span>
  <h2 class="st" id="sec3Title"></h2>
  <p class="sd" id="sec3Desc"></p>
  <div class="cc">
    <div class="ch">
      <div>
        <div class="ct" id="bChartTitle"></div>
        <div class="cx" id="bChartCtx"></div>
      </div>
      <div class="ctrls">
        <span class="cl" id="bSeasonLbl"></span>
        <select class="cs" id="bSeasonSel" onchange="setBarSeason(this.value)"></select>
        <span class="cl" id="bStatLbl"></span>
        <select class="cs" id="bStatSel" onchange="setBarStat(this.value)"></select>
      </div>
    </div>
    <div class="cw"><canvas id="barChart" height="260"></canvas></div>
  </div>
  <p class="foot" id="footTxt"></p>
</div>

<script>
// ── TRANSLATIONS ──
var T = {
  en:{
    syn:"Synthetic Data", back:"← Portfolio",
    heroEy:"SEG3125 — Assignment 5",
    heroH1:"Football Stats <span style='color:var(--go)'>Dashboard</span>",
    heroSub:"Exploring performance statistics for five players across five seasons (2020–2025). Use the controls below each chart to filter and compare.",
    heroMeta:"Data is AI-generated for academic purposes and does not reflect real player statistics.",
    sec1Lbl:"Overview", sec1Title:"Season at a Glance",
    kpi1:"Players Tracked", kpi2:"Seasons Covered", kpi3:"Total Goals (2024–25)", kpi4:"Top Scorer",
    sec2Lbl:"Chart 1 — Line Chart", sec2Title:"Goals Per Season",
    sec2Desc:"Track how each player's goal tally has changed over time. Select which players to display and adjust the season range.",
    lChartTitle:"Goals Per Season (2020–2025)",
    lChartCtx:"Each line represents one player. Totals are for league appearances only.",
    fromLbl:"From:", toLbl:"To:", playersLbl:"Players:",
    sec3Lbl:"Chart 2 — Bar Chart", sec3Title:"Season Stat Comparison",
    sec3Desc:"Compare a selected statistic across all five players for a chosen season.",
    bChartTitle:"Player Comparison",
    bChartCtx:"Bars show each player's value for the selected stat and season.",
    bSeasonLbl:"Season:", bStatLbl:"Stat:",
    stats:{goals:"Goals",assists:"Assists",sot:"Shots on Target",kp:"Key Passes"},
    foot:"Majd Al Khori · 300240467 · SEG3125, University of Ottawa · Summer 2026 · Data: AI-generated (synthetic)"
  },
  fr:{
    syn:"Données Synthétiques", back:"← Portfolio",
    heroEy:"SEG3125 — Devoir 5",
    heroH1:"Statistiques Football — <span style='color:var(--go)'>Tableau de Bord</span>",
    heroSub:"Exploration des statistiques de cinq joueurs sur cinq saisons (2020–2025). Utilisez les contrôles sous chaque graphique pour filtrer et comparer.",
    heroMeta:"Les données sont générées par IA à des fins académiques et ne reflètent pas de vraies statistiques.",
    sec1Lbl:"Aperçu", sec1Title:"Saison en Bref",
    kpi1:"Joueurs Suivis", kpi2:"Saisons Couvertes", kpi3:"Buts Totaux (2024–25)", kpi4:"Meilleur Buteur",
    sec2Lbl:"Graphique 1 — Courbe", sec2Title:"Buts Par Saison",
    sec2Desc:"Suivez l'évolution du nombre de buts de chaque joueur. Sélectionnez les joueurs et ajustez la plage de saisons.",
    lChartTitle:"Buts Par Saison (2020–2025)",
    lChartCtx:"Chaque ligne représente un joueur. Totaux pour les matchs de championnat uniquement.",
    fromLbl:"De :", toLbl:"À :", playersLbl:"Joueurs :",
    sec3Lbl:"Graphique 2 — Barres", sec3Title:"Comparaison de Statistiques",
    sec3Desc:"Comparez une statistique pour les cinq joueurs sur une saison donnée.",
    bChartTitle:"Comparaison des Joueurs",
    bChartCtx:"Les barres montrent la valeur de chaque joueur pour la statistique et saison choisies.",
    bSeasonLbl:"Saison :", bStatLbl:"Statistique :",
    stats:{goals:"Buts",assists:"Passes décisives",sot:"Tirs cadrés",kp:"Passes clés"},
    foot:"Majd Al Khori · 300240467 · SEG3125, Université d'Ottawa · Été 2026 · Données : générées par IA (synthétiques)"
  }
};

// ── DATA ──
var PLAYERS=["Ronaldo","Mbappé","Salah","Haaland","Benzema"];
var SEASONS=["2020–21","2021–22","2022–23","2023–24","2024–25"];
var COLORS=["#1a6b3a","#c9a84c","#0f3f6e","#8b1a1a","#555555"];
var DATA={
  goals:{"Ronaldo":[24,18,15,12,10],"Mbappé":[27,29,31,34,28],"Salah":[22,23,19,26,24],"Haaland":[20,29,36,27,32],"Benzema":[23,27,15,11,9]},
  assists:{"Ronaldo":[3,4,2,3,2],"Mbappé":[16,17,13,12,15],"Salah":[10,11,14,12,13],"Haaland":[6,6,8,5,9],"Benzema":[9,10,4,3,2]},
  sot:{"Ronaldo":[72,62,54,45,38],"Mbappé":[89,94,102,110,97],"Salah":[76,80,70,88,82],"Haaland":[68,90,112,95,108],"Benzema":[74,88,55,40,30]},
  kp:{"Ronaldo":[28,22,18,15,12],"Mbappé":[75,82,70,68,77],"Salah":[62,68,74,70,72],"Haaland":[24,28,34,30,36],"Benzema":[58,65,32,24,18]}
};

// ── STATE ──
var lang='en';
var fromIdx=0, toIdx=4;
var active=[true,true,true,true,true];
var barSeason=SEASONS[4];
var barStat='goals';
var lineChartInst=null, barChartInst=null;

function setLang(l){
  lang=l;
  document.getElementById('btnEN').className='lbtn'+(l==='en'?' on':'');
  document.getElementById('btnFR').className='lbtn'+(l==='fr'?' on':'');
  updateText();
  buildLineChart();
  buildBarChart();
}

function updateText(){
  var t=T[lang];
  document.getElementById('synBadge').textContent=t.syn;
  document.getElementById('backLnk').innerHTML=t.back;
  document.getElementById('heroEy').textContent=t.heroEy;
  document.getElementById('heroH1').innerHTML=t.heroH1;
  document.getElementById('heroSub').textContent=t.heroSub;
  document.getElementById('heroMeta').textContent=t.heroMeta;
  document.getElementById('sec1Lbl').textContent=t.sec1Lbl;
  document.getElementById('sec1Title').textContent=t.sec1Title;
  document.getElementById('sec2Lbl').textContent=t.sec2Lbl;
  document.getElementById('sec2Title').textContent=t.sec2Title;
  document.getElementById('sec2Desc').textContent=t.sec2Desc;
  document.getElementById('lChartTitle').textContent=t.lChartTitle;
  document.getElementById('lChartCtx').textContent=t.lChartCtx;
  document.getElementById('fromLbl').textContent=t.fromLbl;
  document.getElementById('toLbl').textContent=t.toLbl;
  document.getElementById('playersLbl').textContent=t.playersLbl;
  document.getElementById('sec3Lbl').textContent=t.sec3Lbl;
  document.getElementById('sec3Title').textContent=t.sec3Title;
  document.getElementById('sec3Desc').textContent=t.sec3Desc;
  document.getElementById('bChartTitle').textContent=t.bChartTitle;
  document.getElementById('bChartCtx').textContent=t.bChartCtx;
  document.getElementById('bSeasonLbl').textContent=t.bSeasonLbl;
  document.getElementById('bStatLbl').textContent=t.bStatLbl;
  document.getElementById('footTxt').textContent=t.foot;
  buildKPIs();
  buildSeasonSelects();
  buildPlayerToggles();
  buildBarSelects();
}

function buildKPIs(){
  var t=T[lang];
  var total=PLAYERS.reduce(function(s,p){return s+DATA.goals[p][4];},0);
  var topP='', topV=-1;
  PLAYERS.forEach(function(p){if(DATA.goals[p][4]>topV){topV=DATA.goals[p][4];topP=p;}});
  document.getElementById('kpiRow').innerHTML=
    kpi('5',t.kpi1)+kpi('5',t.kpi2)+kpi(String(total),t.kpi3)+kpi(topP,t.kpi4);
}
function kpi(val,lbl){return '<div class="kc"><div class="kv">'+val+'</div><div class="kl">'+lbl+'</div></div>';}

function buildSeasonSelects(){
  var fs=document.getElementById('fromSel');
  var ts=document.getElementById('toSel');
  fs.innerHTML=''; ts.innerHTML='';
  SEASONS.slice(0,-1).forEach(function(s,i){
    var o=document.createElement('option');
    o.value=String(i); o.textContent=s;
    if(i===fromIdx) o.selected=true;
    fs.appendChild(o);
  });
  SEASONS.slice(1).forEach(function(s,i){
    var o=document.createElement('option');
    o.value=String(i+1); o.textContent=s;
    if(i+1===toIdx) o.selected=true;
    ts.appendChild(o);
  });
}

function buildPlayerToggles(){
  var el=document.getElementById('playerToggles');
  el.innerHTML='';
  PLAYERS.forEach(function(p,i){
    var b=document.createElement('button');
    b.className='pt'+(active[i]?' on':'');
    if(active[i]) b.style.backgroundColor=COLORS[i];
    b.textContent=p;
    b.onclick=(function(idx){return function(){active[idx]=!active[idx];buildPlayerToggles();buildLineChart();};})(i);
    el.appendChild(b);
  });
}

function buildBarSelects(){
  var t=T[lang];
  var ss=document.getElementById('bSeasonSel');
  var st=document.getElementById('bStatSel');
  ss.innerHTML=''; st.innerHTML='';
  SEASONS.forEach(function(s){
    var o=document.createElement('option');
    o.value=s; o.textContent=s;
    if(s===barSeason) o.selected=true;
    ss.appendChild(o);
  });
  Object.keys(t.stats).forEach(function(k){
    var o=document.createElement('option');
    o.value=k; o.textContent=t.stats[k];
    if(k===barStat) o.selected=true;
    st.appendChild(o);
  });
}

function setFrom(v){fromIdx=parseInt(v);if(fromIdx>=toIdx)toIdx=fromIdx+1;buildSeasonSelects();buildLineChart();}
function setTo(v){toIdx=parseInt(v);if(toIdx<=fromIdx)fromIdx=toIdx-1;buildSeasonSelects();buildLineChart();}
function setBarSeason(v){barSeason=v;buildBarChart();}
function setBarStat(v){barStat=v;buildBarChart();}

function buildLineChart(){
  var t=T[lang];
  var labels=SEASONS.slice(fromIdx,toIdx+1);
  var datasets=PLAYERS.filter(function(_,i){return active[i];}).map(function(p,i){
    var ci=PLAYERS.indexOf(p);
    return{
      label:p,
      data:DATA.goals[p].slice(fromIdx,toIdx+1),
      borderColor:COLORS[ci],
      backgroundColor:COLORS[ci]+'22',
      borderWidth:2.5,pointRadius:5,pointHoverRadius:7,tension:0.3,fill:false
    };
  });
  if(lineChartInst){lineChartInst.destroy();lineChartInst=null;}
  var ctx=document.getElementById('lineChart');
  lineChartInst=new Chart(ctx,{
    type:'line',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,
      plugins:{
        legend:{position:'top',labels:{font:{family:'Poppins',size:12},padding:14,boxWidth:13}},
        title:{display:true,text:t.lChartTitle,font:{family:'Playfair Display',size:13},color:'#1a1a1a',padding:{bottom:8}},
        tooltip:{mode:'index',intersect:false}
      },
      scales:{
        x:{grid:{color:'#f0ebe0'},ticks:{font:{family:'Poppins',size:11},color:'#6b6b6b'}},
        y:{beginAtZero:true,grid:{color:'#f0ebe0'},ticks:{font:{family:'Poppins',size:11},color:'#6b6b6b'},
          title:{display:true,text:t.stats.goals,font:{family:'Poppins',size:11},color:'#6b6b6b'}}
      }
    }
  });
}

function buildBarChart(){
  var t=T[lang];
  var sidx=SEASONS.indexOf(barSeason);
  var vals=PLAYERS.map(function(p){return DATA[barStat][p][sidx];});
  var mx=Math.max.apply(null,vals);
  if(barChartInst){barChartInst.destroy();barChartInst=null;}
  var ctx=document.getElementById('barChart');
  barChartInst=new Chart(ctx,{
    type:'bar',
    data:{
      labels:PLAYERS,
      datasets:[{
        label:t.stats[barStat],
        data:vals,
        backgroundColor:COLORS.map(function(c){return c+'cc';}),
        borderColor:COLORS,
        borderWidth:1.5,
        borderRadius:4
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        title:{display:true,text:t.stats[barStat]+' — '+barSeason,font:{family:'Playfair Display',size:13},color:'#1a1a1a',padding:{bottom:8}},
        tooltip:{callbacks:{label:function(c){return t.stats[barStat]+': '+c.raw;}}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Poppins',size:12},color:'#1a1a1a'}},
        y:{beginAtZero:true,max:Math.ceil(mx*1.15),grid:{color:'#f0ebe0'},
          ticks:{font:{family:'Poppins',size:11},color:'#6b6b6b'},
          title:{display:true,text:t.stats[barStat],font:{family:'Poppins',size:11},color:'#6b6b6b'}}
      }
    }
  });
}

// ── INIT ──
updateText();
buildLineChart();
buildBarChart();
</script>
</body>
</html>
